<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snakes & Ladders: Intelligence Edition</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container" role="main">
        <!-- Left column — Game Board -->
        <div class="board-column">
            <h1 class="board-header">INTELLIGENCE EDITION</h1>
            <div class="board" id="board">
                <!-- Squares will be generated by JS -->
                <div class="player-token" id="player-token"></div>
            </div>
            
        </div>

        <!-- Right column — Game Panel -->
        <div class="panel-column">
            <div class="status-bar" aria-live="polite" role="status">
                <div class="status-item">Turn: <span id="turn-display">0</span></div>
                <div class="status-item">Position: <span id="pos-display">0</span></div>
                <div class="status-item">Score: <span id="score-display">0</span></div>
                <div class="status-item difficulty-badge" id="diff-badge">MEDIUM</div>
            </div>

            <!-- Main CTA -->
            <button class="roll-btn" id="roll-btn" aria-label="Roll Dice for Next Challenge">ROLL FOR CHALLENGE</button>

            <!-- Loading Spinner (Hidden by default) -->
            <div class="loading-state hidden" id="loading-state" aria-live="assertive" role="alert">
                <div class="spinner"></div>
                <p id="loading-text">Gemini is thinking...</p>
            </div>

            <!-- Challenge Card (Hidden by default) -->
            <div class="card challenge-card hidden" id="challenge-card">
                <div class="card-header">
                    <span class="type-badge" id="ch-type-badge">TRIVIA</span>
                    <div class="timer-container">
                        <div class="timer-bar" id="timer-bar"></div>
                    </div>
                </div>
                <h2 class="question-text" id="ch-question">Question text goes here?</h2>
                <div class="hint-section">
                    <button class="hint-btn" id="hint-btn">Reveal Hint (-1 pt)</button>
                    <p class="hint-text hidden" id="ch-hint"></p>
                </div>
                <textarea class="answer-input" id="answer-input" placeholder="Type your answer here..."></textarea>
                <button class="submit-btn" id="submit-btn">SUBMIT ANSWER</button>
            </div>

            <!-- Result Card (Hidden by default) -->
            <div class="card result-card hidden" id="result-card">
                <div class="score-display-large" id="res-score">6</div>
                <p class="feedback-msg" id="res-feedback">Feedback msg!</p>
                <div class="correct-answer-box">
                    <strong>Correct Answer:</strong> <span id="res-correct"></span>
                </div>
                <div class="move-indicator" id="res-move">Moved 6 spaces</div>
                <div class="event-msg hidden" id="res-event">Oh no! A snake!</div>
                <button class="next-btn" id="next-btn">NEXT TURN</button>
            </div>

            <!-- Score History Log -->
            <div class="history-log">
                <h3>Recent History</h3>
                <div id="history-container">
                    <!-- History items JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="config.example.js"></script>
    <script src="config.js"></script>
    <script src="gemini.js"></script>
    <script src="game.js"></script>
</body>
</html>
